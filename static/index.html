<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>U-Lite 医学图像分割</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 16px; }

  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #fff; padding: 20px 0; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  header h1 { font-size: 22px; font-weight: 600; }
  header p { font-size: 13px; opacity: .75; margin-top: 4px; }

  .section {
    background: #fff; border-radius: 12px; padding: 20px;
    margin-top: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .section h2 { font-size: 16px; margin-bottom: 14px; color: #16213e; }

  .drop-zone {
    border: 2px dashed #c0c4d6; border-radius: 10px;
    padding: 36px 20px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s; position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #4a6cf7; background: #f0f4ff;
  }
  .drop-zone.has-file { border-color: #4a6cf7; background: #f7f9fc; }
  .drop-zone-icon { font-size: 40px; color: #8e95b0; margin-bottom: 8px; }
  .drop-zone-text { font-size: 14px; color: #555; }
  .drop-zone-text span { color: #4a6cf7; font-weight: 500; }
  .drop-zone-hint { font-size: 12px; color: #999; margin-top: 6px; }
  .drop-zone input[type=file] { display: none; }
  .file-name { margin-top: 8px; font-size: 13px; color: #4a6cf7; font-weight: 500; }

  .preview-row { display: flex; gap: 12px; margin-top: 12px; }
  .preview-box { flex: 1; border-radius: 8px; overflow: hidden; background: #f7f9fc; }
  .preview-box img { width: 100%; height: 160px; object-fit: cover; display: block; }
  .preview-box .label { font-size: 12px; color: #666; padding: 4px 8px; text-align: center; background: #eee; }

  .params { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
  .param-group { flex: 1; min-width: 120px; }
  .param-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  .param-group input, .param-group select {
    width: 100%; padding: 8px 10px; border: 1px solid #d0d4e0; border-radius: 6px;
    font-size: 14px; background: #fff; outline: none;
  }
  .param-group input:focus, .param-group select:focus { border-color: #4a6cf7; }

  .btn {
    display: block; width: 100%; padding: 12px; margin-top: 14px;
    border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .2s, opacity .2s;
  }
  .btn-primary { background: #4a6cf7; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #3a5ce5; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-secondary { background: #e8eaef; color: #333; }
  .btn-secondary:hover { background: #dcdff0; }

  .spinner {
    display: inline-block; width: 18px; height: 18px; margin-right: 8px;
    border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
    border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-bar {
    text-align: center; padding: 14px; font-size: 14px; color: #555;
    display: none;
  }
  .status-bar.active { display: block; }
  .status-bar.error { color: #e74c3c; }
  .status-bar.success { color: #27ae60; }

  .result-grid { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
  .result-card {
    flex: 1; min-width: 200px; border-radius: 8px; overflow: hidden;
    background: #f7f9fc; border: 1px solid #eef0f4;
  }
  .result-card img { width: 100%; display: block; cursor: pointer; }
  .result-card .card-label {
    font-size: 12px; color: #666; padding: 6px 10px; text-align: center;
    background: #f0f2f5; border-top: 1px solid #eef0f4;
  }

  .metrics { margin-top: 14px; }
  .metrics table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .metrics td {
    padding: 8px 10px; border-bottom: 1px solid #f0f2f5;
  }
  .metrics td:first-child { color: #666; width: 100px; }
  .metrics td:last-child { font-weight: 500; text-align: right; }

  .preview-row-before { display: none; }
  .preview-row-before.visible { display: flex; }

  @media (max-width: 480px) {
    .container { padding: 12px; }
    header h1 { font-size: 18px; }
    .result-grid { flex-direction: column; }
    .preview-row { flex-direction: column; }
    .preview-box img { height: auto; max-height: 200px; }
  }
</style>
</head>
<body>

<header>
  <h1>U-Lite 医学图像分割</h1>
  <p>上传医学图像，自动分割病灶区域</p>
</header>

<div class="container">

  <!-- Upload Section -->
  <div class="section">
    <h2>上传图片</h2>
    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-icon">📁</div>
      <div class="drop-zone-text">拖拽图片到这里，或 <span>点击选择</span></div>
      <div class="drop-zone-hint">支持 JPG / PNG / BMP / WebP</div>
      <div class="file-name" id="fileName"></div>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="preview-row preview-row-before" id="previewRow">
      <div class="preview-box">
        <img id="previewImg" src="" alt="预览">
        <div class="label">原图预览</div>
      </div>
    </div>

    <button class="btn btn-primary" id="submitBtn" disabled>开始分割</button>

    <div class="status-bar" id="statusBar"></div>
  </div>

  <!-- Result Section -->
  <div class="section" id="resultSection" style="display:none;">
    <h2>分割结果</h2>
    <div class="result-grid">
      <div class="result-card">
        <img id="origResult" src="" alt="原图">
        <div class="card-label">原图</div>
      </div>
      <div class="result-card">
        <img id="segResult" src="" alt="分割结果">
        <div class="card-label">分割结果</div>
      </div>
    </div>

    <div class="metrics">
      <table>
        <tr><td>推理耗时</td><td id="mTime">--</td></tr>
        <tr><td>病灶面积</td><td id="mArea">--</td></tr>
        <tr><td>病灶占比</td><td id="mRatio">--</td></tr>
        <tr><td>使用模型</td><td id="mModel">--</td></tr>
      </table>
    </div>

    <button class="btn btn-secondary" id="resetBtn">重新上传</button>
  </div>

</div>

<script>
(function() {
  const BASE = '';
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileName = document.getElementById('fileName');
  const previewRow = document.getElementById('previewRow');
  const previewImg = document.getElementById('previewImg');
  const submitBtn = document.getElementById('submitBtn');
  const statusBar = document.getElementById('statusBar');
  const resultSection = document.getElementById('resultSection');
  const origResult = document.getElementById('origResult');
  const segResult = document.getElementById('segResult');
  const resetBtn = document.getElementById('resetBtn');

  let selectedFile = null;
  let polling = false;

  // ── Drag & Drop / Click ──
  function onFileSelect(file) {
    if (!file) return;
    const valid = ['image/jpeg','image/png','image/bmp','image/webp','image/tiff'];
    if (!valid.includes(file.type)) {
      showStatus('仅支持 JPG/PNG/BMP/WebP 格式', true);
      return;
    }
    selectedFile = file;
    fileName.textContent = file.name;
    dropZone.classList.add('has-file');

    const reader = new FileReader();
    reader.onload = function(e) {
      previewImg.src = e.target.result;
      previewRow.classList.add('visible');
    };
    reader.readAsDataURL(file);
    submitBtn.disabled = false;
    hideStatus();
  }

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => onFileSelect(fileInput.files[0]));

  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) onFileSelect(e.dataTransfer.files[0]);
  });

  // ── Status ──
  function showStatus(msg, isError) {
    statusBar.textContent = msg;
    statusBar.className = 'status-bar active' + (isError ? ' error' : '');
  }

  function showSuccess(msg) {
    statusBar.textContent = msg;
    statusBar.className = 'status-bar active success';
  }

  function hideStatus() {
    statusBar.className = 'status-bar';
    statusBar.textContent = '';
  }

  // ── Submit ──
  submitBtn.addEventListener('click', startInference);

  async function startInference() {
    if (!selectedFile || polling) return;

    polling = true;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span>提交中...';
    showStatus('正在上传图片...');

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      // 1) Submit
      const submitRes = await fetch(BASE + '/predict', { method: 'POST', body: formData });
      if (!submitRes.ok) {
        const err = await submitRes.json().catch(() => ({}));
        throw new Error(err.detail || '提交失败');
      }
      const submitData = await submitRes.json();
      const taskId = submitData.task_id;
      if (!taskId) throw new Error('未收到任务 ID');

      showStatus('任务已提交，正在推理...');

      // 2) Poll
      let result = null;
      for (let i = 0; i < 300; i++) {
        await new Promise(r => setTimeout(r, 1000));
        const pollRes = await fetch(BASE + '/predict/' + taskId);
        if (!pollRes.ok) continue;
        result = await pollRes.json();
        if (result.status === 'completed') break;
        if (result.status === 'failed') throw new Error(result.error || '推理失败');
        showStatus('推理中... (' + (i + 1) + 's)');
      }

      if (!result || result.status !== 'completed') throw new Error('推理超时');

      // 3) Show result
      showResult(result);
      showSuccess('推理完成');
    } catch (err) {
      showStatus(err.message || '推理失败', true);
      submitBtn.disabled = false;
      submitBtn.innerHTML = '开始分割';
      polling = false;
    }
  }

  function showResult(data) {
    const origUrl = data.original_image_url || '';
    const segUrl = data.result_image_url || '';
    origResult.src = origUrl ? (BASE + origUrl) : '';
    segResult.src = segUrl ? (BASE + segUrl) : '';

    document.getElementById('mTime').textContent = data.inference_time_ms != null ? data.inference_time_ms + ' ms' : '--';
    document.getElementById('mArea').textContent = data.lesion_area != null ? data.lesion_area.toLocaleString() + ' px' : '--';
    document.getElementById('mRatio').textContent = data.lesion_ratio != null ? (data.lesion_ratio * 100).toFixed(2) + '%' : '--';
    document.getElementById('mModel').textContent = data.model_name || '--';

    resultSection.style.display = 'block';
    resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    submitBtn.disabled = false;
    submitBtn.innerHTML = '开始分割';
    polling = false;
  }

  // ── Reset ──
  resetBtn.addEventListener('click', () => {
    resultSection.style.display = 'none';
    selectedFile = null;
    fileInput.value = '';
    fileName.textContent = '';
    dropZone.classList.remove('has-file');
    previewRow.classList.remove('visible');
    previewImg.src = '';
    submitBtn.disabled = true;
    hideStatus();
    polling = false;
    submitBtn.innerHTML = '开始分割';
    submitBtn.disabled = false;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

})();
</script>
</body>
</html>
